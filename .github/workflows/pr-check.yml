name: pr-check

# Fast per-PR validation. Deliberately does NOT build the site: the full build
# (build.yml) clones the archive + reads ~16k metadata files + runs vite-ssg,
# which is a deploy-time job, not a PR gate. Here we only need "does the code
# compile and do the unit tests pass" — no archive, no network to the CDN, no
# 16k-file checkout. The real build still runs on merge to main.
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# A new push to the PR cancels the previous still-running check — no stacking.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # Insurance: the suite runs in seconds, so anything approaching this cap
    # means something hung — fail fast instead of burning a runner.
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # 22, not 20: the suite runs `.test.ts` files directly under
          # `node --test`, which needs Node 22's native TypeScript stripping.
          # Node 20 fails them with ERR_UNKNOWN_FILE_EXTENSION. Kept in sync
          # with build.yml so PR tests and the prod build run the same Node.
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # node --test (lib + scripts) then vitest (composables + loaders). Both
      # are self-contained — they read their own fixtures, not the archive data.
      - name: Run tests
        run: npm run test:all
