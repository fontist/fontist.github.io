name: Link Checker

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  link_checker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Same build-time metadata the main build needs — see build.yml.
      - name: Checkout archive-private (metadata only)
        id: meta
        continue-on-error: true
        uses: actions/checkout@v6
        with:
          repository: fontist/fontist-archive-private
          token: ${{ secrets.FONTIST_CI_PAT_TOKEN }}
          path: vendor/archive-private
          filter: blob:none
          sparse-checkout: |
            fonts.json
            font-metadata.json
          sparse-checkout-cone-mode: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          ARCHIVE_META_PATH: ${{ steps.meta.outcome == 'success' && 'vendor/archive-private' || '' }}
        run: npm run build

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Check if site was built
        run: |
          if [ ! -d "dist" ]; then
            echo "Error: dist directory not created"
            exit 1
          fi
          echo "Site built successfully"
          ls -la dist/

      - name: Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --config lychee.toml
            --root-dir ${{ github.workspace }}/dist
            'dist/**/*.html'
          fail: true
          output: link-check-results.md
          format: markdown

      - name: Upload link check results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-check-results
          path: link-check-results.md
          retention-days: 30

      - name: Comment PR with results
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '## 🔗 Link Check Failed\n\n';

            if (fs.existsSync('link-check-results.md')) {
              const results = fs.readFileSync('link-check-results.md', 'utf8');
              comment += '### Results\n\n' + results + '\n\n';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
