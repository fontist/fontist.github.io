name: build

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
      - CONTRIBUTING.md
      - LICENSE
      - .gitignore
  pull_request:
  workflow_dispatch:
  repository_dispatch:
    types: [rebuild]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Fetch pre-built data from fontist-archive
        run: |
          git clone --depth 1 https://github.com/fontist/fontist-archive.git /tmp/archive
          mkdir -p public/coverage public/fonts
          cp -r /tmp/archive/coverage/* public/coverage/ 2>/dev/null || true
          cp /tmp/archive/fonts/*.woff2 public/fonts/ 2>/dev/null || true
          cp /tmp/archive/fonts.json public/ 2>/dev/null || true
          cp /tmp/archive/font-metadata.json public/ 2>/dev/null || true
          rm -rf /tmp/archive

      - name: Fetch formulas data
        run: |
          curl -sL https://raw.githubusercontent.com/fontist/formulas/main/docs/public/formulas-data.json \
            -o public/formulas-data.json || true
          curl -sL https://raw.githubusercontent.com/fontist/formulas/main/docs/public/stats.json \
            -o public/stats.json || true

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    if: github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
