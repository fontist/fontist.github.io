name: build

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
      - CONTRIBUTING.md
      - LICENSE
      - .gitignore
  pull_request:
  workflow_dispatch:
  repository_dispatch:
    types: [rebuild]

# Least privilege by default. `pages: write` / `id-token: write` are granted
# only to the deploy job, so a pull_request build cannot touch Pages even if
# the deploy gate below were misconfigured.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # `pages: read` is what actions/configure-pages needs to read the Pages
    # config (it does not enable Pages here, and its outputs are unused —
    # astro.config.mjs hardcodes `site`). Deliberately not `write`: a PR build
    # must not be able to publish.
    permissions:
      contents: read
      pages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (fetch-data.sh clones the archive + formulas v5, then vite-ssg builds)
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    if: github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    needs: build
    # Pages write access lives here only — the build job above runs read-only.
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
