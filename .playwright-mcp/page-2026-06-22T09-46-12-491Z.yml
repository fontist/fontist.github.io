    - generic [ref=e71]:
      - article [ref=e74]:
        - heading "🌐 Cross-Platform" [level=2] [ref=e75]
        - paragraph [ref=e76]: Same commands work identically on Windows, macOS, and Linux. No platform-specific paths to remember.
      - article [ref=e79]:
        - heading "📦 Formula-Based" [level=2] [ref=e80]
        - paragraph [ref=e81]: 3000+ fonts available through community-maintained formulas with automatic download and license handling.
      - article [ref=e84]:
        - heading "📋 Manifest Support" [level=2] [ref=e85]
        - paragraph [ref=e86]: Define font requirements in YAML for reproducible installations across environments and CI/CD pipelines.
      - article [ref=e89]:
        - heading "🔄 CI/CD Ready" [level=2] [ref=e90]
        - paragraph [ref=e91]: Perfect for automated environments with non-interactive installation. GitHub Action available.
      - article [ref=e94]:
        - heading "🔍 System Detection" [level=2] [ref=e95]
        - paragraph [ref=e96]: Detects and indexes fonts already installed on your system. No redundant downloads.
      - article [ref=e99]:
        - heading "⚡ Fontconfig Integration" [level=2] [ref=e100]
        - paragraph [ref=e101]: Optional fontconfig integration for seamless font discovery in Linux environments.
