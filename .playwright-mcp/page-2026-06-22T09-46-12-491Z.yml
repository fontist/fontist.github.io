      - paragraph [ref=e120]:
        - strong [ref=e121]: CI/CD Pipelines
        - text: — Automatically install fonts in GitHub Actions, GitLab CI, or any automation system. Non-interactive mode ensures reliable, reproducible builds.
      - paragraph [ref=e122]:
        - strong [ref=e123]: Document Publishing
        - text: — Essential for Metanorma, Asciidoctor, and other document generation tools that require specific fonts for PDF rendering.
      - paragraph [ref=e124]:
        - strong [ref=e125]: Development Environments
        - text: — Ensure consistent fonts across team machines without manual installation. One command sets up everything.
      - heading "Why Fontist? Permalink to \"Why Fontist?\"" [level=2] [ref=e126]:
        - text: Why Fontist?
        - link "Permalink to \"Why Fontist?\"" [ref=e127] [cursor=pointer]:
