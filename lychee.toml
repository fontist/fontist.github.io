# Lychee Link Checker Configuration
# For Documentation: https://github.com/lycheeverse/lychee

# Cache results to avoid re-checking same URLs
cache = true
max_cache_age = "1d"

# Accept status codes
accept = [
  "100..=103",  # Informational
  "200..=299",  # Success
  "429"         # Too Many Requests (retry handled by max_retries)
]

# Link checking behavior
max_redirects = 10
max_retries = 3
timeout = 20

# User agent to identify ourselves
user_agent = "lychee/fontist-link-checker"

# Verbose output for debugging
verbose = "info"

# Exclude patterns
exclude = [
  "https://github.com/fontist/fontist.github.io*",
  "https://github.com/fontist/formulas*",
  "http://example.com/*",
  "https://open.ribose.com*",
]
