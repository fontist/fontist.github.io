# Lychee Link Checker Configuration
# For Documentation: https://github.com/lycheeverse/lychee

# Cache results to avoid re-checking same URLs
cache = true
max_cache_age = "1d"

# Accept redirects (3xx) and 202 Accepted — they are normal web behavior,
# not broken links. Many legitimate external URLs redirect from
# http→https or old paths→new. Some sites (fontsquirrel.com) return 202
# for bot protection.
accept = ["200", "202", "301", "302", "307", "308"]

# Longer timeout for slow external sites (gnu.org, gust.org.pl, etc.)
timeout = 60

# Maximum number of retries before reporting a link as broken
max_retries = 5

# Check both source files and built site
include_verbatim = true

# File types to check
include = [
  "dist/**/*.html"
]

# Exclude patterns for URLs
exclude = [
  ".git",
  ".github",
  "node_modules",
  "vendor",
  ".bundle",
  ".sass-cache",
  ".jekyll-cache",
  # Exclude malformed escaped URLs in blog posts
  "%5C%5C%5C%22*",
  # Exclude blog post links without .html extension (clean URLs)
  "/blog/2022-02-11-introducing-fontist$",
  "/blog/2022-02-11-macos-fonts$",
  "/blog/2024-01-23-office-fonts$",
  "/blog/2024-03-02-creating-formulas$",
  # Exclude placeholder URLs in code examples (formula-structure guide)
  "https?://url[0-9]+/font\\.zip",
  # Exclude placeholder URLs in code examples
  "fonts\\.gstatic\\.com/s/robotoflex/v30/HASH",
  # Adobe returns intermittent HTTP/2 protocol errors from their CDN.
  # The URL is valid — verified manually — but the server is unreliable.
  "https?://www\\.adobe\\.com/type/legal\\.html",
  # Unicode chart PDFs — verified correct (.pdf extension). The
  # unicode.org CDN intermittently drops connections from CI runners,
  # causing false "Connection failed" errors. Excluded since the URL
  # format is deterministically generated from block data.
  "https?://www\\.unicode\\.org/charts/PDF/",
  # gnu.org blocks/throttles CI bot requests, causing consistent timeouts.
  # The license URLs are well-known and valid.
  "https?://www\\.gnu\\.org/",
  # gust.org.pl consistently times out from CI runners (slow European
  # academic server). The GUST font license URLs are well-known and valid.
  "https?://(www\\.)?gust\\.org\\.pl/",
  # og:image must be an absolute URL (social crawlers ignore relative ones),
  # so the new og-image.png is referenced as https://www.fontist.org/og-image.png
  # before it has deployed. Exclude it from live-URL verification.
  "https?://(www\\.)?fontist\\.org/og-image\\.png",

  # Exclude all canonical fontist.org URLs from live verification. The
  # link checker runs on dist/ but every page's canonical/og:url points
  # to https://www.fontist.org/<path>, and the live site lags behind
  # this branch — every newly-added page would 404 until deploy. The
  # internal-link integrity is already verified by the relative-URL
  # checks lychee runs against dist/.
  "https?://(www\\.)?fontist\\.org/",
]
